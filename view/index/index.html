            async function toggleArticleTag(tagId, checked) {
                const articleId = window.currentArticleId;
                const url = checked
                    ? "/api/articles/add-tag"
                    : "/api/articles/remove-tag";

                await ajax(url, {
                    method: "POST",
                    body: JSON.stringify({
                        article_id: articleId,
                        tag_id: tagId,
                    }),
                });
            }

            async function markAboveRead(index) {
                const article = state.articles[index];
                const res = await ajax("/api/articles/read-above", {
                    method: "POST",
                    body: JSON.stringify({ article_id: article.id }),
                });
                if (res.code === 0 || res.code === "success") {
                    // 统计每个订阅源被标记为已读的文章数量
                    const feedUnreadCount = {};
                    state.articles.forEach((a, i) => {
                        if (i <= index && !a.read) {
                            a.read = 1;
                            feedUnreadCount[a.feed_id] =
                                (feedUnreadCount[a.feed_id] || 0) + 1;
                        }
                    });

                    // 更新订阅源的未读数量
                    Object.keys(feedUnreadCount).forEach((feedId) => {
                        const feed = state.feeds.find((f) => f.id == feedId);
                        if (feed) {
                            feed.unread_count = Math.max(
                                0,
                                feed.unread_count - feedUnreadCount[feedId],
                            );
                        }
                    });
                    renderFeeds();
                    updateAllUnread();

                    renderArticles();
                    // 如果是当前选中的文章，更新已读按钮状态
                    if (index === state.currentIndex) {
                        updateReadBtn(1);
                    }
                }
            }

            // 分享文章
            async function shareArticle() {
                if (state.currentIndex < 0) {
                    showToast("请先选择一篇文章", "warning");
                    return;
                }

                const article = state.articles[state.currentIndex];
                const shareData = {
                    title: article.title,
                    text: article.excerpt?.substring(0, 100) + "...",
                    url: article.url,
                };

                // 检查是否支持 Web Share API
                if (navigator.share) {
                    try {
                        await navigator.share(shareData);
                    } catch (err) {
                        // 用户取消分享
                        if (err.name !== "AbortError") {
                            fallbackShare(article);
                        }
                    }
                } else {
                    fallbackShare(article);
                }
            }

            // 备用分享方式
            function fallbackShare(article) {
                const shareHtml = `
                    <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" id="shareDialog" onclick="this.remove()">
                        <div class="bg-base-100 p-6 rounded-lg shadow-xl max-w-sm w-full" onclick="event.stopPropagation()">

                                </button>
                                <button class="btn btn-ghost flex flex-col items-center gap-1 p-3" data-share="twitter">

                `;
                document.body.insertAdjacentHTML("beforeend", shareHtml);

                // 绑定分享按钮事件
                const dialog = document.getElementById("shareDialog");
                dialog.querySelector('[data-share="copy"]').onclick =

                        copyToClipboard(article.url);

                        dialog.remove();
                    };
                dialog.querySelector('[data-share="weibo"]').onclick =
                    function () {
                        openShareWindow(

                                "&title=" +
                                encodeURIComponent(article.title),

                        dialog.remove();
                    };
                dialog.querySelector('[data-share="email"]').onclick =

                            encodeURIComponent(article.title) +
                            "&body=" +
                            encodeURIComponent(article.url);
                        dialog.remove();
                    };

            // 复制到剪贴板
            async function copyToClipboard(text) {
                try {
                    await navigator.clipboard.writeText(text);
                    showToast("链接已复制到剪贴板");
                } catch (err) {
                    // 备用方案
                    const textarea = document.createElement("textarea");
                    textarea.value = text;
                    textarea.style.position = "fixed";
                    textarea.style.opacity = "0";
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand("copy");
                    document.body.removeChild(textarea);
                    showToast("链接已复制到剪贴板");
                }
            }

            // 显示提示 - 支持不同类型 (success, error, warning)，duration 为毫秒数，0 表示不自动关闭
            function showToast(message, type = "info", duration = 3000) {
                console.log("showToast:", message, type); // 调试日志

                const toast = document.createElement("div");

                // 根据类型设置样式
                let bgClass = "bg-base-300 text-base-content";
                let icon = "";

                switch (type) {
                    case "success":
                        bgClass = "bg-success text-success-content";
                        icon =
                            '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>';
                        break;
                    case "error":
                        bgClass = "bg-error text-error-content";
                        icon =
                            '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>';
                        break;
                    case "warning":
                        bgClass = "bg-warning text-warning-content";
                        icon =
                            '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>';
                        break;
                    case "info":
                    default:
                        bgClass = "bg-info text-info-content";
                        icon =
                            '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>';
                        break;
                }

                // 移除已存在的相同类型提示，避免重叠
                const existingToasts = document.querySelectorAll(
                    ".toast-notification",
                );
                existingToasts.forEach((t) => t.remove());

                // 初始状态：透明且上移（从顶部出现）
                toast.style.cssText =
                    "position: fixed; top: 1rem; left: 50%; transform: translate(-50%, -20px); opacity: 0; transition: all 0.3s ease-out; z-index: 9999;";
                toast.className = `toast-notification ${bgClass} px-4 py-3 rounded-lg shadow-lg flex items-center gap-2 min-w-[200px] justify-center`;
                toast.innerHTML = `${icon}<span>${message}</span>`;

                document.body.appendChild(toast);

                // 触发动画：淡入并下移
                requestAnimationFrame(() => {
                    toast.style.opacity = "1";
                    toast.style.transform = "translate(-50%, 0)";
                });

                // duration 为 0 时不自动关闭，需要手动调用 hideToast
                if (duration !== 0) {
                    setTimeout(() => {
                        // 消失动画：淡出并上移（回到顶部）
                        toast.style.transition = "all 0.3s ease-in";
                        toast.style.opacity = "0";
                        toast.style.transform = "translate(-50%, -20px)";

                        // 动画结束后移除元素
                        setTimeout(() => {
                            if (toast.parentNode) {
                                toast.remove();
                            }
                        }, 300);
                    }, duration || 2000);
                }
            }

            // 隐藏 toast 提示
            function hideToast() {
                const toasts = document.querySelectorAll(".toast-notification");
                toasts.forEach((toast) => {
                    toast.style.transition = "all 0.3s ease-in";
                    toast.style.opacity = "0";
                    toast.style.transform = "translate(-50%, -20px)";
                    setTimeout(() => {
                        if (toast.parentNode) {
                            toast.remove();
                        }
                    }, 300);
                });
            }

            // 自定义确认对话框（替代原生 confirm）
            function showConfirmDialog(message, onConfirm, onCancel) {
                return new Promise((resolve) => {
                    const dialogHtml = `
                        <div class="confirm-dialog modal modal-open z-50">
                            <div class="modal-box max-w-sm">
                                <h3 class="font-bold text-lg flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-warning" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                                    </svg>
                                    确认操作
                                </h3>
                                <p class="py-4">${message}</p>
                                <div class="modal-action">
                                    <button class="btn btn-ghost cancel-btn">取消</button>
                                    <button class="btn btn-error confirm-btn">确认</button>
                                </div>
                            </div>
                            <div class="modal-backdrop"></div>
                        </div>
                    `;

                    document.body.insertAdjacentHTML("beforeend", dialogHtml);
                    const dialog = document.querySelector(".confirm-dialog");

                    const cleanup = () => {
                        if (dialog) dialog.remove();
                    };

                    dialog
                        .querySelector(".cancel-btn")
                        .addEventListener("click", () => {
                            cleanup();
                            if (onCancel) onCancel();
                            resolve(false);
                        });

                    dialog
                        .querySelector(".confirm-btn")
                        .addEventListener("click", () => {
                            cleanup();
                            if (onConfirm) onConfirm();
                            resolve(true);
                        });

                    // 点击背景关闭
                    const backdrop = dialog.querySelector(".modal-backdrop");
                    if (backdrop) {
                        backdrop.addEventListener("click", () => {
                            cleanup();
                            if (onCancel) onCancel();
                            resolve(false);
                        });
                    }

                    // ESC 键关闭
                    const escHandler = (e) => {
                        if (e.key === "Escape") {
                            document.removeEventListener("keydown", escHandler);
                            cleanup();
                            if (onCancel) onCancel();
                            resolve(false);
                        }
                    };
                    document.addEventListener("keydown", escHandler);
                });
            }

            // 翻译文章
            let isTranslated = false;
            let originalContentHtml = null;
            function translateArticle() {
                if (state.currentIndex < 0) return;

                const article = state.articles[state.currentIndex];
                if (!article) return;

                // 检查翻译服务是否加载
                if (typeof translate === "undefined") {
                    showToast("翻译服务加载中，请稍后重试");
                    return;
                }

                if (isTranslated) {
                    // 如果已经翻译，恢复原文
                    if (originalContentHtml) {
                        const container =
                            document.getElementById("articleDetail");
                        container.innerHTML = originalContentHtml;
                    }
                    isTranslated = false;
                    originalContentHtml = null;
                    showToast("已恢复原文");
                    return;
                }

                // 显示翻译中提示
                showToast("正在翻译...");

                try {
                    // 保存当前 HTML
                    const container = document.getElementById("articleDetail");
                    originalContentHtml = container.innerHTML;

                    // 使用 translate.js 进行翻译
                    // 自动检测语言并翻译
                    translate.execute();

                    // 添加已翻译标记
                    setTimeout(() => {
                        const headerEl =
                            document.querySelector("article header");
                        if (
                            headerEl &&
                            !headerEl.querySelector(".translated-badge")
                        ) {
                            const badge = document.createElement("span");
                            badge.className =
                                "translated-badge badge badge-sm badge-primary ml-2";
                            badge.textContent = "已翻译";
                            const sourceInfo = headerEl.querySelector(
                                ".text-base-content\\/60",
                            );
                            if (sourceInfo) {
                                sourceInfo.appendChild(badge);
                            }
                        }

                        // 添加翻译说明
                        const articleEl = document.querySelector("article");
                        if (
                            articleEl &&
                            !articleEl.querySelector(".translation-note")
                        ) {
                            const note = document.createElement("div");
                            note.className =
                                "translation-note mt-8 p-4 bg-base-200 rounded-lg text-sm text-base-content/60";
                            note.innerHTML =
                                "<p>本文已使用 translate.js 自动翻译。点击翻译按钮可恢复原文。</p>";
                            articleEl.appendChild(note);
                        }

                        isTranslated = true;
                        showToast("翻译完成");
                    }, 1500);
                } catch (err) {
                    console.error("翻译失败:", err);
                    showToast("翻译失败: " + err.message);
                }
            }

            // 翻译文本函数
            async function translateText(text) {
                if (!text || typeof translate === "undefined") {
                    throw new Error("翻译服务未加载");
                }

                // 检测是否为英文内容（简单检测）
                const isEnglish = /^[\x00-\x7F]*$/.test(
                    text.replace(/\s/g, ""),
                );
                if (isEnglish) {
                    // 英文翻译为中文
                    translate.language.setTarget("chinese_simplified");
                } else {
                    // 其他语言翻译为英文
                    translate.language.setTarget("english");
                }

                // 使用 translate.js 的翻译功能
                return new Promise((resolve, reject) => {
                    try {
                        // 直接翻译文本
                        translate.text(text, function (translatedText) {
                            if (translatedText && translatedText !== text) {
                                resolve(translatedText);
                            } else {
                                // 如果翻译失败，返回原文
                                resolve(text);
                            }
                        });
                    } catch (err) {
                        reject(err);
                    }
                });
            }
        </script>
        <!-- translate.js 翻译库 -->
        <script src="https://res.zvo.cn/translate/translate.js"></script>
        <script>
            // 初始化 translate.js
            document.addEventListener("DOMContentLoaded", function () {
                if (typeof translate !== "undefined") {
                    // 设置使用版本2的翻译引擎
                    translate.setUseVersion2();
                    // 设置本地语言（当前页面语言）
                    translate.language.setLocal("chinese_simplified");
                }
            });
        </script>
        <script>
            // Page Visibility API - 页面重新可见时自动刷新
            document.addEventListener("DOMContentLoaded", function () {
                let lastVisibleTime = Date.now();
                const REFRESH_THRESHOLD = 30000; // 30秒阈值

                document.addEventListener("visibilitychange", function () {
                    // 确保 state 已初始化
                    if (typeof state === "undefined") {
                        return;
                    }

                    if (document.visibilityState === "visible") {
                        const now = Date.now();
                        const hiddenDuration = now - lastVisibleTime;

                        // 如果页面隐藏超过30秒，执行刷新
                        if (hiddenDuration > REFRESH_THRESHOLD) {
                            console.log("页面重新活跃，执行刷新...");

                            // 根据当前视图类型执行刷新
                            if (
                                state.currentType === "feed" &&
                                state.currentId
                            ) {
                                // 刷新当前订阅源
                                refreshSingleFeed(state.currentId);
                            } else if (
                                state.currentType === "all" ||
                                state.currentType === "starred"
                            ) {
                                // 刷新全部
                                refreshFeed();
                            }

                            // 重新加载文章列表
                            loadArticles();
                        }

                        lastVisibleTime = now;
                    } else {
                        // 页面隐藏时更新时间
                        lastVisibleTime = Date.now();
                    }
                });
            });
        </script>
    </body>
</html>
